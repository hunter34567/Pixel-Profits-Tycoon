<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone HTML - Textured Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; cursor: crosshair; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #0f0;
            background: rgba(0,0,0,0.7); padding: 15px; border: 2px solid #0f0;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }
        #msg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: #f00; font-size: 60px; font-weight: bold; display: none; text-shadow: 4px 4px #000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Health: <span id="hp">100</span>%</div>
        <div>Threats: <span id="count">0</span></div>
        <div id="zone-warning" style="color: #ff0; font-size: 0.8em; margin-top: 5px;">ZONE COLLAPSING</div>
    </div>
    <div id="msg">VICTORY</div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hpEl = document.getElementById('hp');
const countEl = document.getElementById('count');
const msgEl = document.getElementById('msg');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const worldSize = 4000;
let zoneRadius = 2500;
const keys = {};
const bullets = [];
const enemies = [];

// --- PROCEDURAL TEXTURE GENERATION ---
function createFloorTexture() {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = 128;
    tempCanvas.height = 128;
    const tCtx = tempCanvas.getContext('2d');
    // Base grass/dirt
    tCtx.fillStyle = '#3d4d21';
    tCtx.fillRect(0, 0, 128, 128);
    // Add noise/texture
    for(let i=0; i<500; i++) {
        tCtx.fillStyle = `rgba(0,0,0,${Math.random() * 0.2})`;
        tCtx.fillRect(Math.random()*128, Math.random()*128, 2, 2);
        tCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.1})`;
        tCtx.fillRect(Math.random()*128, Math.random()*128, 1, 1);
    }
    return ctx.createPattern(tempCanvas, 'repeat');
}

const floorPattern = createFloorTexture();

const player = { 
    x: worldSize / 2, y: worldSize / 2, 
    r: 18, color: '#2ecc71', speed: 5, hp: 100 
};

for (let i = 0; i < 40; i++) {
    enemies.push({
        x: Math.random() * worldSize,
        y: Math.random() * worldSize,
        r: 18, color: '#e74c3c', speed: 2.5, hp: 60, lastShot: 0
    });
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', shoot);

function shoot(e) {
    const angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
    bullets.push({
        x: player.x, y: player.y,
        vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12,
        fromPlayer: true, life: 100
    });
}

function drawPlayer(x, y, color, isEnemy = false) {
    // Body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI*2);
    ctx.fill();
    // Tactical Vest Detail
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.stroke();
    // Helmet
    ctx.fillStyle = '#2c3e50';
    ctx.beginPath();
    ctx.arc(x, y - 5, 10, 0, Math.PI*2);
    ctx.fill();
}

function update() {
    if (player.hp <= 0) {
        msgEl.innerText = "ELIMINATED";
        msgEl.style.display = "block";
        return;
    }

    if (keys['KeyW']) player.y -= player.speed;
    if (keys['KeyS']) player.y += player.speed;
    if (keys['KeyA']) player.x -= player.speed;
    if (keys['KeyD']) player.x += player.speed;

    zoneRadius -= 0.15;
    const distFromCenter = Math.hypot(player.x - worldSize/2, player.y - worldSize/2);
    if (distFromCenter > zoneRadius) player.hp -= 0.15;

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        b.life--;
        if(b.life <= 0) bullets.splice(i, 1);
        
        if (b.fromPlayer) {
            enemies.forEach((en, ei) => {
                if (Math.hypot(b.x - en.x, b.y - en.y) < en.r) {
                    en.hp -= 20;
                    bullets.splice(i, 1);
                    if (en.hp <= 0) enemies.splice(ei, 1);
                }
            });
        } else {
            if (Math.hypot(b.x - player.x, b.y - player.y) < player.r) {
                player.hp -= 5;
                bullets.splice(i, 1);
            }
        }
    });

    enemies.forEach(en => {
        const d = Math.hypot(player.x - en.x, player.y - en.y);
        if (d < 600) {
            en.x += (player.x - en.x) / d * en.speed;
            en.y += (player.y - en.y) / d * en.speed;
            if (Date.now() - en.lastShot > 1200) {
                const angle = Math.atan2(player.y - en.y, player.x - en.x);
                bullets.push({ x: en.x, y: en.y, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8, fromPlayer: false, life: 100 });
                en.lastShot = Date.now();
            }
        }
    });

    if (enemies.length === 0) {
        msgEl.innerText = "VICTORY: #1";
        msgEl.style.display = "block";
    }
    
    hpEl.innerText = Math.max(0, Math.ceil(player.hp));
    countEl.innerText = enemies.length;
    
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-player.x + canvas.width/2, -player.y + canvas.height/2);

    // Draw Textured Floor
    ctx.fillStyle = floorPattern;
    ctx.fillRect(0, 0, worldSize, worldSize);

    // Draw Map Border
    ctx.strokeStyle = "#ff0";
    ctx.lineWidth = 10;
    ctx.strokeRect(0, 0, worldSize, worldSize);

    // Draw the "Gas" (The Forbidden Area)
    ctx.fillStyle = "rgba(0, 255, 0, 0.2)"; // Green gas effect
    ctx.beginPath();
    ctx.rect(-1000, -1000, worldSize + 2000, worldSize + 2000);
    ctx.arc(worldSize/2, worldSize/2, zoneRadius, 0, Math.PI*2, true);
    ctx.fill();

    // Draw Zone Circle Line
    ctx.beginPath();
    ctx.arc(worldSize/2, worldSize/2, zoneRadius, 0, Math.PI*2);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
    ctx.lineWidth = 5;
    ctx.stroke();

    // Draw Entities
    drawPlayer(player.x, player.y, '#2ecc71');
    enemies.forEach(en => drawPlayer(en.x, en.y, '#c0392b', true));

    // Draw Bullets with Glow
    ctx.shadowBlur = 10;
    ctx.shadowColor = "yellow";
    ctx.fillStyle = "#fff";
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.shadowBlur = 0;

    ctx.restore();
}

update();
</script>
</body>
</html>
