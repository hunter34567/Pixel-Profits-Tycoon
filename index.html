<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warzone HTML - Ultra Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; z-index: 10; }
        .hud-card { 
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            padding: 10px 20px; border-left: 4px solid #f1c40f; margin-bottom: 5px;
        }
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 5;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
            border: 2px solid rgba(255,255,255,0.4); border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 6;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <div id="ui">
        <div class="hud-card">
            <div style="font-size: 10px; opacity: 0.6;">OPERATOR ID: HUNTER</div>
            <div style="font-size: 24px; font-weight: bold;">$ <span id="cash">0</span></div>
        </div>
        <div class="hud-card" style="border-color: #0af;">
            <div style="font-size: 10px; opacity: 0.6;">ARMOR INTEGRITY</div>
            <div style="font-size: 18px;"><span id="armor">100</span>%</div>
        </div>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

<script>
/**
 * 1. THE "ULTRA" LIGHTING ENGINE
 */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020205);
scene.fog = new THREE.FogExp2(0x020205, 0.001);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true; // High-end shadows
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Realistic Sun
const sun = new THREE.DirectionalLight(0xffffff, 2.5);
sun.position.set(200, 500, 200);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048; 
sun.shadow.mapSize.height = 2048;
scene.add(sun);

const ambient = new THREE.AmbientLight(0x4040ff, 0.2); // Blueish night bounce light
scene.add(ambient);

/**
 * 2. PROCEDURAL HIGH-RES TEXTURES
 */
function createDetailedFloor() {
    const size = 1024;
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');
    
    // Concrete Base
    ctx.fillStyle = '#111';
    ctx.fillRect(0,0,size,size);
    
    // Grime & Cracks
    for(let i=0; i<2000; i++) {
        ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.5})`;
        ctx.fillRect(Math.random()*size, Math.random()*size, 2, 2);
    }
    
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(50, 50);
    return tex;
}

const groundMaterial = new THREE.MeshStandardMaterial({ 
    map: createDetailedFloor(),
    roughness: 0.8,
    metalness: 0.2
});

const ground = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

/**
 * 3. THE PLAYER & WEAPON SWAY
 */
const player = { pos: new THREE.Vector3(0, 15, 0), hp: 100, armor: 100, cash: 0 };
const gunGroup = new THREE.Group();
const gunBody = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 1.8, 10),
    new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 1, roughness: 0.2 })
);
gunBody.position.set(3, -3, -6);
gunGroup.add(gunBody);
scene.add(gunGroup);

/**
 * 4. GAME SYSTEMS
 */
const enemies = [];
const bullets = [];
const keys = {};

function spawnHostile() {
    const group = new THREE.Group();
    // Character Body
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(6, 18, 4, 8), new THREE.MeshStandardMaterial({ color: 0x222222 }));
    body.castShadow = true;
    group.add(body);
    // Glowing Eyes
    const eyes = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
    eyes.position.set(0, 12, -4);
    group.add(eyes);
    
    group.position.set((Math.random()-0.5)*3000, 20, (Math.random()-0.5)*3000);
    scene.add(group);
    enemies.push({ mesh: group, hp: 100 });
}

for(let i=0; i<30; i++) spawnHostile();

// Controls
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function shoot() {
    const b = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    b.position.copy(player.pos).add(dir.multiplyScalar(5));
    bullets.push({ mesh: b, dir: dir.clone(), speed: 25, life: 100 });
    scene.add(b);
}

window.addEventListener('mousedown', () => {
    if(document.pointerLockElement) shoot();
    else renderer.domElement.requestPointerLock();
});

/**
 * 5. ANIMATION & FX
 */
let time = 0;
function update() {
    requestAnimationFrame(update);
    time += 0.01;

    // Movement with Head Bob
    const moveDir = new THREE.Vector3();
    camera.getWorldDirection(moveDir);
    moveDir.y = 0; moveDir.normalize();
    const sideDir = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), moveDir);

    let isMoving = false;
    if(keys['KeyW']) { player.pos.addScaledVector(moveDir, 4); isMoving = true; }
    if(keys['KeyS']) { player.pos.addScaledVector(moveDir, -4); isMoving = true; }
    if(keys['KeyA']) { player.pos.addScaledVector(sideDir, 4); isMoving = true; }
    if(keys['KeyD']) { player.pos.addScaledVector(sideDir, -4); isMoving = true; }

    // Head Bob & Weapon Sway
    const bob = isMoving ? Math.sin(time * 10) * 0.5 : 0;
    camera.position.copy(player.pos);
    camera.position.y += bob;
    
    gunGroup.position.copy(player.pos);
    gunGroup.rotation.copy(camera.rotation);
    gunGroup.position.y += bob * 0.5; // Gun follows bob but smoother

    // Combat
    bullets.forEach((b, i) => {
        b.mesh.position.addScaledVector(b.dir, b.speed);
        b.life--;
        enemies.forEach((en, ei) => {
            if(b.mesh.position.distanceTo(en.mesh.position) < 15) {
                scene.remove(en.mesh); enemies.splice(ei, 1);
                player.cash += 500;
            }
        });
        if(b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); }
    });

    document.getElementById('cash').innerText = player.cash;
    renderer.render(scene, camera);
}

// Mouse look
let yaw = 0, pitch = 0;
window.addEventListener('mousemove', e => {
    if(document.pointerLockElement) {
        yaw -= e.movementX * 0.002;
        pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.002));
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
});

update();
</script>
</body>
</html>
