<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crazy Digger Frenzy</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; color: white; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; user-select: none; touch-action: manipulation; }
        #ui-layer { position: absolute; top: 15px; left: 15px; right: 15px; pointer-events: none; display: flex; justify-content: space-between; }
        .stat-box { background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .stat { font-size: 18px; font-weight: bold; color: #ffcc00; }
        #frenzy-container { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); width: 180px; height: 12px; background: #333; border-radius: 10px; border: 2px solid #fff; overflow: hidden; }
        #frenzy-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0000, #ffcc00); transition: width 0.1s; }
        #shop { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 0 10px; box-sizing: border-box; }
        button { padding: 10px 14px; font-size: 13px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; pointer-events: auto; }
        .upgrade-btn { background: #2196f3; box-shadow: 0 3px #1565c0; }
        .auto-btn { background: #9c27b0; box-shadow: 0 3px #7b1fa2; }
        .zbd-btn { background: #00cf8d; box-shadow: 0 3px #008f61; width: 100%; margin-top: 5px; }
        #zbd-section { background: rgba(0,207,141,0.15); padding: 8px; border-radius: 10px; border: 1px solid #00cf8d; width: 180px; text-align: center; }
        input { width: 90%; padding: 5px; margin: 5px 0; border-radius: 4px; border: none; text-align: center; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-box">
            <div class="stat">💰 Gold: <span id="gold-count">0</span></div>
            <div class="stat">📏 Depth: <span id="depth-count">0</span>m</div>
        </div>
        <div id="zbd-section">
            <input type="text" id="zbd-tag" placeholder="ZBD Gamertag">
            <button class="zbd-btn" onclick="requestPayout()">Cashout 10 Sats</button>
        </div>
    </div>

    <div id="frenzy-container"><div id="frenzy-bar"></div></div>

    <div id="shop">
        <button class="upgrade-btn" onclick="buyPower()">Pickaxe (Cost: <span id="p-cost">50</span>)</button>
        <button class="auto-btn" onclick="buyAuto()">Miner (Cost: <span id="a-cost">100</span>)</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let state = { gold: 0, depth: 0, digPower: 1, autoMiners: 0, pCost: 50, aCost: 100 };
        let blocks = [], particles = [], frenzy = 0, isFrenzy = false, lastAuto = 0;
        const COLS = 5, ROWS = 10;
        let blockSize = window.innerWidth / COLS;

        // Load Game
        if(localStorage.getItem('diggerSave')) state = JSON.parse(localStorage.getItem('diggerSave'));
        function save() { localStorage.setItem('diggerSave', JSON.stringify(state)); }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            blockSize = canvas.width / COLS;
            for (let y = 0; y < ROWS; y++) addRow(y);
            updateUI();
        }

        function addRow(yOffset) {
            for (let x = 0; x < COLS; x++) {
                let hpBase = 3 + Math.floor(state.depth / 20);
                blocks.push({
                    x: x * blockSize,
                    y: yOffset * blockSize + 150,
                    hp: hpBase, maxHp: hpBase,
                    color: `hsl(${25 + (state.depth % 360)}, 60%, ${35 - (x % 2 * 5)}%)`
                });
            }
        }

        function handleDig(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            processHit(x, y, state.digPower * (isFrenzy ? 3 : 1));
            frenzy = Math.min(100, frenzy + 2);
        }

        function processHit(x, y, damage) {
            for (let i = blocks.length - 1; i >= 0; i--) {
                let b = blocks[i];
                if (x > b.x && x < b.x + blockSize && y > b.y && y < b.y + blockSize) {
                    b.hp -= damage;
                    spawnParticles(x, y, b.color);
                    if (b.hp <= 0) {
                        state.gold += 5;
                        blocks.splice(i, 1);
                        state.depth++;
                        if (blocks.length < (COLS * ROWS) - 5) {
                            blocks.forEach(bl => bl.y -= blockSize);
                            addRow(ROWS - 1);
                        }
                    }
                    save();
                    updateUI();
                    break;
                }
            }
        }

        function spawnParticles(x, y, color) {
            for(let i=0; i<5; i++) particles.push({x, y, sx:(Math.random()-0.5)*8, sy:(Math.random()-0.5)*8, life:1, color});
        }

        function buyPower() {
            if (state.gold >= state.pCost) {
                state.gold -= state.pCost; state.digPower++; state.pCost *= 2;
                save(); updateUI();
            }
        }

        function buyAuto() {
            if (state.gold >= state.aCost) {
                state.gold -= state.aCost; state.autoMiners++; state.aCost *= 2;
                save(); updateUI();
            }
        }

        async function requestPayout() {
            const tag = document.getElementById('zbd-tag').value;
            if (state.gold < 1000) return alert("Need 1,000 Gold!");
            if (!tag) return alert("Enter ZBD Tag!");
            
            const response = await fetch('/api/pay', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gamertag: tag, amountSats: 1 })
            });
            const res = await response.json();
            if (res.success) { state.gold -= 1000; save(); updateUI(); alert("Sats Sent!"); }
        }

        function updateUI() {
            document.getElementById('gold-count').innerText = state.gold;
            document.getElementById('depth-count').innerText = state.depth;
            document.getElementById('p-cost').innerText = state.pCost;
            document.getElementById('a-cost').innerText = state.aCost;
        }

        function animate(time) {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Frenzy Logic
            if (frenzy >= 100) isFrenzy = true;
            if (isFrenzy) { frenzy -= 0.5; if (frenzy <= 0) isFrenzy = false; }
            else { frenzy = Math.max(0, frenzy - 0.1); }
            document.getElementById('frenzy-bar').style.width = frenzy + "%";

            // Auto Miners
            if (time - lastAuto > 1000 && state.autoMiners > 0) {
                state.gold += state.autoMiners;
                lastAuto = time; updateUI();
            }

            blocks.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x + 1, b.y + 1, blockSize - 2, blockSize - 2);
            });

            particles.forEach((p, i) => {
                p.x += p.sx; p.y += p.sy; p.life -= 0.02;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
                if (p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', handleDig);
        window.addEventListener('touchstart', handleDig);
        init(); animate(0);
    </script>
</body>
</html>
