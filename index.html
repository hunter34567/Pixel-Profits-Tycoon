<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Warzone - NO TEXTURE EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="ui">
        <div>HP: <span id="hp">100</span></div>
        <div>ENEMIES: <span id="count">0</span></div>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

<script>
// 1. Scene Setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222); 

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 2. THE ULTIMATE FIX: No StandardMaterial, No Loaders, No Maps.
// We are using MeshBasicMaterial with hex colors ONLY.
const groundGeo = new THREE.PlaneGeometry(2000, 2000);
const groundMat = new THREE.MeshBasicMaterial({ color: 0x334433 }); // Solid Dark Green
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// 3. Grid (To help see movement since there's no texture)
const grid = new THREE.GridHelper(2000, 50, 0x00ff00, 0x444444);
scene.add(grid);

// 4. Game Objects
const enemies = [];
const player = { pos: new THREE.Vector3(0, 10, 0), hp: 100 };

for(let i=0; i<20; i++) {
    const enMesh = new THREE.Mesh(
        new THREE.BoxGeometry(10, 20, 10),
        new THREE.MeshBasicMaterial({ color: 0xff0000 }) // Solid Red
    );
    enMesh.position.set((Math.random()-0.5)*1000, 10, (Math.random()-0.5)*1000);
    scene.add(enMesh);
    enemies.push(enMesh);
}

// 5. Controls & Logic
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

let yaw = 0;
window.addEventListener('mousemove', e => {
    if(document.pointerLockElement) {
        yaw -= e.movementX * 0.003;
        camera.rotation.set(0, yaw, 0, 'YXZ');
    }
});

renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();

function animate() {
    requestAnimationFrame(animate);

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y = 0; dir.normalize();

    if(keys['KeyW']) player.pos.addScaledVector(dir, 2);
    if(keys['KeyS']) player.pos.addScaledVector(dir, -2);
    
    camera.position.copy(player.pos);

    // Basic AI follow
    enemies.forEach(en => {
        const dist = en.position.distanceTo(player.pos);
        if(dist < 400) {
            en.lookAt(player.pos.x, 10, player.pos.z);
            en.translateZ(0.5);
        }
    });

    document.getElementById('hp').innerText = Math.ceil(player.hp);
    document.getElementById('count').innerText = enemies.length;

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
